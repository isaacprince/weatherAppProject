<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weatherAppProject</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
   
    <form class="weatherForm">
       <input type="text" class="cityInput" placeholder="Enter a city name">
       <button type="submit" class="searchBtn">Get Weather</button>
    </form>

    <div class="card">
        <h1 class="cityDisplay"> Miami</h1>
        <p class="temperatureDisplay">90°F</p>
        <p class="humidityDisplay">Humidity: 75%</p>
        <p class="descDisplay">Clear Skies</p>
        <p class="weatherEmoji">🌞</p>
        <p class="errorDisplay" hidden>Please enter a city</p>
    </div>

    <script src="./index.js"></script>
</body>
</html>
